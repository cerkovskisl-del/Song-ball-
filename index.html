<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salabotā Bumbiņu Spēle</title>
    <style>
        body {
            margin: 0;
            background-color: #0b0214;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }
        #ui-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        #score {
            font-size: 32px;
            font-weight: bold;
        }
        select {
            padding: 8px 12px;
            font-size: 16px;
            background-color: #221435;
            color: white;
            border: 2px solid #ff007f;
            border-radius: 5px;
            cursor: pointer;
            outline: none;
        }
        canvas {
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(255, 0, 128, 0.3);
            background-color: #05010a;
        }
        #info {
            margin-top: 15px;
            font-size: 14px;
            color: #ff007f;
            font-weight: bold;
            animation: blink 1.5s infinite;
        }
        @keyframes blink {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }
    </style>
</head>
<body>

    <div id="ui-container">
        <div id="score">0/10</div>
        <select id="songSelect">
            <option value="axelf">🎵 Crazy Frog / Axel F</option>
            <option value="twinkle">🌟 Twinkle Twinkle Little Star</option>
        </select>
    </div>

    <canvas id="gameCanvas" width="500" height="500"></canvas>
    <div id="info">⚠️ UZKLIKŠĶINI UZ EKRĀNA, LAI IESLĒGTU SKAŅU!</div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");
        const songSelect = document.getElementById("songSelect");
        const infoElement = document.getElementById("info");

        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const outerRadius = 220; 
        let rotationAngle = 0; 
        const rotationSpeed = 0.015; 

        const gravity = 0.25; 
        let balls = [];
        let maxBalls = 10;
        let spawnedBallsCount = 0;
        let escapedBalls = 0;

        const openingSize = 0.45; 

        // Īsto dziesmu nošu frekvences
        const songs = {
            axelf: [
                293.66, 349.23, 293.66, 293.66, 392.00, 293.66, 261.63,
                293.66, 440.00, 293.66, 293.66, 466.16, 440.00, 349.23,
                293.66, 440.00, 587.33, 293.66, 261.63, 261.63, 349.23, 293.66
            ],
            twinkle: [
                261.63, 261.63, 392.00, 392.00, 440.00, 440.00, 392.00,
                349.23, 349.23, 329.63, 329.63, 293.66, 293.66, 261.63
            ]
        };

        let noteIndex = 0;
        let audioCtx = null;

        // Audio inicializācija pēc klikšķa
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            infoElement.style.display = "none"; // Paslēpj brīdinājumu, kad aktivizēts
        }

        songSelect.addEventListener('change', () => {
            noteIndex = 0;
        });

        function playNextNote() {
            if (!audioCtx) return; // Ja lietotājs vēl nav uzklikšķinājis, nespēlē neizraisot kļūdu

            const currentSongKey = songSelect.value;
            const currentSong = songs[currentSongKey];

            let freq = currentSong[noteIndex % currentSong.length];
            noteIndex++;

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            // "Triangle" skan vislabāk šāda tipa spēlēm
            osc.type = "triangle"; 
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            
            // Skaļuma efekts - ass sākums, ātra pazušana
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.35);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.35);
        }

        class Ball {
            constructor() {
                this.x = centerX;
                this.y = centerY - 60;
                this.vx = (Math.random() - 0.5) * 6;
                this.vy = (Math.random() - 0.5) * 4;
                this.radius = 11;
                this.color = `hsl(${Math.random() * 360}, 100%, 60%)`;
                this.isDead = false;
            }

            update() {
                this.vy += gravity;
                this.x += this.vx;
                this.y += this.vy;

                let dx = this.x - centerX;
                let dy = this.y - centerY;
                let distance = Math.sqrt(dx * dx + dy * dy);

                // Ja bumbiņa atsitas pret malu
                if (distance + this.radius >= outerRadius) {
                    let ballAngle = Math.atan2(dy, dx);
                    let normalizedAngle = ballAngle - rotationAngle;
                    normalizedAngle = Math.atan2(Math.sin(normalizedAngle), Math.cos(normalizedAngle));

                    // Pārbauda caurumu apakšā
                    if (Math.abs(normalizedAngle - Math.PI/2) < openingSize) {
                        if (!this.isDead) {
                            escapedBalls++;
                            scoreElement.innerText = `${escapedBalls}/${maxBalls}`;
                            this.isDead = true;
                            setTimeout(spawnBall, 400);
                        }
                    } else {
                        // Atlekšanas matemātika
                        let normalX = dx / distance;
                        let normalY = dy / distance;

                        let dotProduct = this.vx * normalX + this.vy * normalY;
                        this.vx -= 2 * dotProduct * normalX;
                        this.vy -= 2 * dotProduct * normalY;

                        // Neļauj bumbiņai iziet cauri sienai
                        this.x = centerX + normalX * (outerRadius - this.radius - 2);
                        this.y = centerY + normalY * (outerRadius - this.radius - 2);
                        
                        // Atskaņo noti
                        playNextNote();
                    }
                }
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.closePath();
            }
        }

        function spawnBall() {
            if (spawnedBallsCount < maxBalls) {
                balls.push(new Ball());
                spawnedBallsCount++;
            }
        }

        function drawOuterCircle() {
            ctx.save();
            ctx.translate(centerX, centerY);
            ctx.rotate(rotationAngle);

            ctx.beginPath();
            ctx.arc(0, 0, outerRadius, Math.PI / 2 + openingSize, Math.PI / 2 - openingSize);
            ctx.lineWidth = 8;
            
            let gradient = ctx.createLinearGradient(-outerRadius, 0, outerRadius, 0);
            gradient.addColorStop(0, '#00ffcc');
            gradient.addColorStop(0.5, '#ff007f');
            gradient.addColorStop(1, '#ffcc00');
            ctx.strokeStyle = gradient;
            ctx.stroke();

            // Smailes
            const spikeCount = 45;
            ctx.fillStyle = "rgba(255, 255, 255, 0.12)";
            for (let i = 0; i < spikeCount; i++) {
                let angle = (i / spikeCount) * Math.PI * 2;
                if (Math.abs(angle - Math.PI/2) < openingSize) continue;

                ctx.save();
                ctx.rotate(angle);
                ctx.beginPath();
                ctx.moveTo(0, -outerRadius + 6);
                ctx.lineTo(-8, -outerRadius + 22);
                ctx.lineTo(8, -outerRadius + 22);
                ctx.closePath();
                ctx.fill();
                ctx.restore();
            }

            ctx.restore();
        }

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            rotationAngle += rotationSpeed;
            drawOuterCircle();

            balls = balls.filter(ball => !ball.isDead);
            balls.forEach(ball => {
                ball.update();
                ball.draw();
            });

            requestAnimationFrame(gameLoop);
        }

        // Klausītāji audio aktivizēšanai no jebkura klikšķa
        window.addEventListener('click', initAudio);
        window.addEventListener('touchstart', initAudio);

        spawnBall();
        gameLoop();
    </script>
</body>
</html>
