<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfekta Ritma Dziesmu Spēle</title>
    <style>
        body {
            margin: 0;
            background-color: #060112;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }
        #ui-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-bottom: 25px;
        }
        select {
            padding: 10px 16px;
            font-size: 16px;
            font-weight: bold;
            background-color: #1a0933;
            color: #00ffcc;
            border: 2px solid #ff007f;
            border-radius: 8px;
            cursor: pointer;
            outline: none;
            box-shadow: 0 0 10px rgba(255, 0, 127, 0.2);
        }
        select:hover {
            background-color: #29104d;
        }
        canvas {
            border: 2px solid rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            box-shadow: 0 0 40px rgba(0, 255, 204, 0.2);
            background-color: #020005;
        }
        #info {
            margin-top: 15px;
            font-size: 14px;
            color: #ff007f;
            font-weight: bold;
            letter-spacing: 1px;
            animation: blink 1.2s infinite;
        }
        @keyframes blink {
            0% { opacity: 0.3; }
            50% { opacity: 1; }
            100% { opacity: 0.3; }
        }
    </style>
</head>
<body>

    <div id="ui-container">
        <select id="songSelect">
            <option value="axelf">🎵 Crazy Frog / Axel F</option>
            <option value="starwars">🌌 Star Wars Main Theme</option>
            <option value="mario">🍄 Super Mario Bros Theme</option>
        </select>
    </div>

    <canvas id="gameCanvas" width="500" height="500"></canvas>
    <div id="info">🎧 UZKLIKŠĶINI UZ EKRĀNA, LAI SĀKTU DZIESMU</div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const songSelect = document.getElementById("songSelect");
        const infoElement = document.getElementById("info");

        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const outerRadius = 220; 
        
        let audioCtx = null;
        let startTime = 0;
        let noteIndex = 0;
        let flashOpacity = 0;

        // Īsto dziesmu dati (Frekvence un relatīvais ritma ātrums BPM)
        const songData = {
            axelf: {
                bpm: 125,
                notes: [
                    293.66, 349.23, 293.66, 293.66, 392.00, 293.66, 261.63,
                    293.66, 440.00, 293.66, 293.66, 466.16, 440.00, 349.23,
                    293.66, 440.00, 587.33, 293.66, 261.63, 261.63, 349.23, 293.66
                ]
            },
            starwars: {
                bpm: 110,
                notes: [
                    220.00, 220.00, 220.00, 293.66, 440.00, 392.00, 349.23, 329.63, 587.33, 440.00,
                    392.00, 349.23, 329.63, 587.33, 440.00, 392.00, 349.23, 392.00, 329.63
                ]
            },
            mario: {
                bpm: 130,
                notes: [
                    659.25, 659.25, 659.25, 523.25, 659.25, 783.99, 392.00,
                    523.25, 392.00, 329.63, 440.00, 493.88, 466.16, 440.00,
                    392.00, 659.25, 783.99, 880.00, 698.46, 783.99, 659.25
                ]
            }
        };

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                startTime = audioCtx.currentTime;
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            infoElement.style.display = "none";
        }

        // Kad nomaina dziesmu, nometam notis uz sākumu
        songSelect.addEventListener('change', () => {
            noteIndex = 0;
            if (audioCtx) startTime = audioCtx.currentTime;
        });

        function playNextNote() {
            if (!audioCtx) return;

            const currentKey = songSelect.value;
            const currentSong = songData[currentKey].notes;

            // Paņemam pareizo noti no saraksta
            let freq = currentSong[noteIndex % currentSong.length];
            noteIndex++;

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            // "Triangle" vilnis perfekti atdarina tos sintezatorus no video shorts
            osc.type = "triangle";
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);

            // Skaņas dzēšana (uzreiz skaļi, tad smuki nodziest)
            gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);

            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);
            
            // Ritma gaismas efekts aplim
            flashOpacity = 0.25;
        }

        class RhythmBall {
            constructor() {
                this.radius = 12;
                this.maxTravel = outerRadius - this.radius - 4;
                this.color = "#00ffcc";
                this.lastHitSide = 0;
            }

            update(elapsedTime) {
                const currentKey = songSelect.value;
                const bpm = songData[currentKey].bpm;
                const beatDuration = 60 / bpm; // Sekundes starp sitieniem

                // Matemātiski sinhronizējam kustību pa vertikālo asi ar dziesmas tempu
                let frequency = Math.PI / beatDuration;
                let positionFactor = Math.cos(frequency * elapsedTime);

                this.x = centerX; // Paliek centrā pa horizontāli
                this.y = centerY + positionFactor * this.maxTravel; // Kustas uz augšu un leju

                // Fiksējam brīdi, kad bumbiņa pieskaras augšai vai apakšai
                let currentSide = Math.sign(Math.round(positionFactor * 100));
                if (currentSide !== this.lastHitSide && Math.abs(positionFactor) > 0.98) {
                    playNextNote();
                    this.lastHitSide = currentSide;
                }
                
                // Kad bumbiņa ir pa vidu, atiestatām atsitiena detektoru
                if (Math.abs(positionFactor) < 0.2) {
                    this.lastHitSide = 0;
                }
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color;
                ctx.fill();
                ctx.closePath();
                ctx.shadowBlur = 0;
            }
        }

        const ball = new RhythmBall();

        function drawOuterCircle() {
            // Pilns aplis bez šķirbām
            ctx.beginPath();
            ctx.arc(centerX, centerY, outerRadius, 0, Math.PI * 2);
            ctx.lineWidth = 6;
            
            // Aplis maina krāsu un uzplaiksnī ritmā
            ctx.strokeStyle = `rgba(255, 0, 127, ${0.3 + flashOpacity})`;
            ctx.stroke();

            if (flashOpacity > 0) flashOpacity -= 0.015;

            // Smailes vizuālajam dizainam
            const spikeCount = 50;
            ctx.fillStyle = "rgba(255, 0, 127, 0.1)";
            for (let i = 0; i < spikeCount; i++) {
                let angle = (i / spikeCount) * Math.PI * 2;
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(angle);
                ctx.beginPath();
                ctx.moveTo(0, -outerRadius + 6);
                ctx.lineTo(-6, -outerRadius + 18);
                ctx.lineTo(6, -outerRadius + 18);
                ctx.closePath();
                ctx.fill();
                ctx.restore();
            }
        }

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            let elapsedTime = audioCtx ? audioCtx.currentTime - startTime : 0;

            drawOuterCircle();
            ball.update(elapsedTime);
            ball.draw();

            requestAnimationFrame(gameLoop);
        }

        window.addEventListener('click', initAudio);
        window.addEventListener('touchstart', initAudio);

        gameLoop();
    </script>
</body>
</html>
