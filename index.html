<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dziesmas Ritma Fizika</title>
    <style>
        body {
            margin: 0;
            background-color: #05010d;
            color: white;
            font-family: monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }
        #ui-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        select {
            padding: 8px 12px;
            font-size: 16px;
            background-color: #1a0933;
            color: #00ffcc;
            border: 2px solid #ff007f;
            border-radius: 5px;
            cursor: pointer;
            outline: none;
        }
        canvas {
            border: 2px solid rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            box-shadow: 0 0 40px rgba(0, 255, 204, 0.2);
            background-color: #010003;
        }
        #info {
            margin-top: 15px;
            font-size: 14px;
            color: #ff007f;
            font-weight: bold;
            animation: blink 1.2s infinite;
        }
        @keyframes blink { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }
    </style>
</head>
<body>

    <div id="ui-container">
        <select id="songSelect">
            <option value="axelf">🎵 Crazy Frog / Axel F (Mainīgs ritms)</option>
            <option value="megalovania">💀 Undertale - Megalovania (Ātrais ritms)</option>
        </select>
    </div>

    <canvas id="gameCanvas" width="500" height="500"></canvas>
    <div id="info">KLIKŠĶINI UZ EKRĀNA, LAI IESLĒGTU</div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const songSelect = document.getElementById("songSelect");
        const infoElement = document.getElementById("info");

        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const outerRadius = 220; 

        let audioCtx = null;
        let noteIndex = 0;
        let flashOpacity = 0;
        
        let noteStartTime = 0;
        let currentNoteDuration = 0.25; // Sākuma nots ilgums sekundēs

        // Katrai notij ir frekvence (Hz) un ilgums (0.5 = parasta nota, 0.25 = ātra nota, 1.0 = lēna/gara nota)
        const songs = {
            axelf: [
                { f: 293.66, d: 0.4 }, { f: 349.23, d: 0.4 }, { f: 293.66, d: 0.2 }, { f: 293.66, d: 0.2 }, // lēni, tad ātri
                { f: 392.00, d: 0.4 }, { f: 293.66, d: 0.4 }, { f: 261.63, d: 0.4 },
                { f: 293.66, d: 0.4 }, { f: 440.00, d: 0.4 }, { f: 293.66, d: 0.2 }, { f: 293.66, d: 0.2 },
                { f: 466.16, d: 0.4 }, { f: 440.00, d: 0.4 }, { f: 349.23, d: 0.4 },
                { f: 293.66, d: 0.3 }, { f: 440.00, d: 0.3 }, { f: 587.33, d: 0.3 }, { f: 293.66, d: 0.2 }, 
                { f: 261.63, d: 0.2 }, { f: 261.63, d: 0.4 }, { f: 349.23, d: 0.4 }, { f: 293.66, d: 0.8 } // pēdējā nota gara (lēna)
            ],
            megalovania: [
                { f: 293.66, d: 0.15 }, { f: 293.66, d: 0.15 }, { f: 587.33, d: 0.3 }, { f: 440.00, d: 0.45 },
                { f: 415.30, d: 0.3 }, { f: 392.00, d: 0.3 }, { f: 349.23, d: 0.3 }, { f: 293.66, d: 0.15 }, 
                { f: 349.23, d: 0.15 }, { f: 392.00, d: 0.15 }
            ]
        };

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                noteStartTime = audioCtx.currentTime;
                // Uzstādām pirmās nots ilgumu bumbiņai
                const currentSong = songs[songSelect.value];
                currentNoteDuration = currentSong[0].d;
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            infoElement.style.display = "none";
        }

        songSelect.addEventListener('change', () => {
            noteIndex = 0;
            if (audioCtx) {
                noteStartTime = audioCtx.currentTime;
                currentNoteDuration = songs[songSelect.value][0].d;
            }
        });

        function playHitNote() {
            if (!audioCtx) return;

            const currentSong = songs[songSelect.value];
            let note = currentSong[noteIndex % currentSong.length];
            
            // Spēlējam pašreizējo noti
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            osc.type = "triangle";
            osc.frequency.setValueAtTime(note.f, audioCtx.currentTime);

            gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + note.d);

            osc.start();
            osc.stop(audioCtx.currentTime + note.d);
            
            flashOpacity = 0.35;

            // PĀRSLĒDZAM UZ NĀKAMO NOTI un pasakām bumbiņai, cik ilga tā būs!
            noteIndex++;
            let nextNote = currentSong[noteIndex % currentSong.length];
            currentNoteDuration = nextNote.d; // Šis maina bumbiņas ātrumu nākamajam lēcienam
            noteStartTime = audioCtx.currentTime;
        }

        class RhythmBall {
            constructor() {
                this.radius = 12;
                this.maxTravel = outerRadius - this.radius - 4;
                this.color = "#00ffcc";
                this.lastHitSide = 0;
            }

            update(currentTime) {
                if (!audioCtx) return;

                // Aprēķinām, cik daudz laika ir pagājis kopš pašreizējās notis sākuma
                let timePassed = currentTime - noteStartTime;
                
                // Procenti no notis ilguma (no 0 līdz 1)
                let progress = timePassed / currentNoteDuration;
                if (progress > 1) progress = 1;

                // Izmantojam kosinusu, lai bumbiņa smuki lēkātu uz priekšu un atpakaļ
                // progress * Math.PI liek bumbiņai tieši vienas notis laikā aizlidot no viena gala līdz otram
                let positionFactor;
                if (noteIndex % 2 === 0) {
                    positionFactor = Math.cos(progress * Math.PI); // Kustība uz leju
                } else {
                    positionFactor = -Math.cos(progress * Math.PI); // Kustība uz augšu
                }

                this.x = centerX;
                this.y = centerY + positionFactor * this.maxTravel;

                // Ja laiks šai notij ir beidzies, bumbiņa ir nonākusi galā -> sitiens!
                if (progress >= 1) {
                    playHitNote();
                }
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color;
                ctx.fill();
                ctx.closePath();
                ctx.shadowBlur = 0;
            }
        }

        const ball = new RhythmBall();

        function drawOuterCircle() {
            ctx.beginPath();
            ctx.arc(centerX, centerY, outerRadius, 0, Math.PI * 2);
            ctx.lineWidth = 6;
            ctx.strokeStyle = `rgba(255, 0, 127, ${0.3 + flashOpacity})`;
            ctx.stroke();

            if (flashOpacity > 0) flashOpacity -= 0.02;

            const spikeCount = 50;
            ctx.fillStyle = "rgba(255, 0, 127, 0.1)";
            for (let i = 0; i < spikeCount; i++) {
                let angle = (i / spikeCount) * Math.PI * 2;
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(angle);
                ctx.beginPath();
                ctx.moveTo(0, -outerRadius + 6);
                ctx.lineTo(-6, -outerRadius + 18);
                ctx.lineTo(6, -outerRadius + 18);
                ctx.closePath();
                ctx.fill();
                ctx.restore();
            }
        }

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            drawOuterCircle();
            
            if (audioCtx) {
                ball.update(audioCtx.currentTime);
            }
            ball.draw();

            requestAnimationFrame(gameLoop);
        }

        window.addEventListener('click', initAudio);
        window.addEventListener('touchstart', initAudio);

        gameLoop();
    </script>
</body>
</html>
