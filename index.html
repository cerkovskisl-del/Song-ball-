        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                noteStartTime = audioCtx.currentTime;
                currentNoteDuration = songs[songSelect.value][0].d;
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            infoElement.style.display = "none";
        }

        songSelect.addEventListener('change', () => {
            noteIndex = 0;
            if (audioCtx) {
                noteStartTime = audioCtx.currentTime;
                currentNoteDuration = songs[songSelect.value][0].d;
            }
        });

        function playHitNote() {
            if (!audioCtx) return;

            const currentSong = songs[songSelect.value];
            let note = currentSong[noteIndex % currentSong.length];
            
            if (note.f > 0) {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);

                osc.type = note.f < 150 ? "sine" : "triangle";
                osc.frequency.setValueAtTime(note.f, audioCtx.currentTime);

                gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + note.d);

                osc.start();
                osc.stop(audioCtx.currentTime + note.d);
                
                flashOpacity = 0.35;
            }

            // Pārejam uz nākamo noti un nosakām tās ilgumu bumbiņai
            noteIndex++;
            let nextNote = currentSong[noteIndex % currentSong.length];
            currentNoteDuration = nextNote.d; 
            noteStartTime = audioCtx.currentTime;
        }

        class RhythmBall {
            constructor() {
                this.radius = 12;
                this.maxTravel = outerRadius - this.radius - 4;
                this.color = "#00ffcc";
            }

            update(currentTime) {
                if (!audioCtx) return;

                let timePassed = currentTime - noteStartTime;
                let progress = timePassed / currentNoteDuration;
                if (progress > 1) progress = 1;

                // Mainām virzienu (augšā/lejā) katrā atsitienā
                let positionFactor;
                if (noteIndex % 2 === 0) {
                    positionFactor = Math.cos(progress * Math.PI);
                } else {
                    positionFactor = -Math.cos(progress * Math.PI);
                }

                this.x = centerX;
                this.y = centerY + positionFactor * this.maxTravel;

                if (progress >= 1) {
                    playHitNote();
                }
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color;
                ctx.fill();
                ctx.closePath();
                ctx.shadowBlur = 0;
            }
        }

        const ball = new RhythmBall();

        function drawOuterCircle() {
            ctx.beginPath();
            ctx.arc(centerX, centerY, outerRadius, 0, Math.PI * 2);
            ctx.lineWidth = 6;
            ctx.strokeStyle = `rgba(255, 0, 127, ${0.3 + flashOpacity})`;
            ctx.stroke();

            if (flashOpacity > 0) flashOpacity -= 0.02;

            const spikeCount = 50;
            ctx.fillStyle = "rgba(255, 0, 127, 0.1)";
            for (let i = 0; i < spikeCount; i++) {
                let angle = (i / spikeCount) * Math.PI * 2;
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(angle);
                ctx.beginPath();
                ctx.moveTo(0, -outerRadius + 6);
                ctx.lineTo(-6, -outerRadius + 18);
                ctx.lineTo(6, -outerRadius + 18);
                ctx.closePath();
                ctx.fill();
                ctx.restore();
            }
        }

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawOuterCircle();
            
            if (audioCtx) {
                ball.update(audioCtx.currentTime);
            }
            ball.draw();

            requestAnimationFrame(gameLoop);
        }

        window.addEventListener('click', initAudio);
        window.addEventListener('touchstart', initAudio);

        gameLoop();
