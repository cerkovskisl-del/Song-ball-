<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Izstrādātas Ritma Melodijas</title>
    <style>
        body {
            margin: 0;
            background-color: #04010a;
            color: white;
            font-family: monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }
        #ui-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }
        select {
            padding: 10px 16px;
            font-size: 16px;
            font-weight: bold;
            background-color: #120526;
            color: #00ffcc;
            border: 2px solid #ff007f;
            border-radius: 6px;
            cursor: pointer;
            outline: none;
        }
        #controls {
            display: flex;
            gap: 10px;
        }
        .toggle-btn {
            padding: 8px 12px;
            font-size: 12px;
            font-weight: bold;
            background-color: #220b40;
            border: 2px solid #00ffcc;
            color: white;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .toggle-btn.active {
            background-color: #00ffcc;
            color: #04010a;
            box-shadow: 0 0 10px #00ffcc;
        }
        canvas {
            border: 2px solid rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            box-shadow: 0 0 40px rgba(0, 255, 204, 0.15);
            background-color: #010003;
        }
        #info {
            margin-top: 10px;
            font-size: 14px;
            color: #ff007f;
            font-weight: bold;
            animation: blink 1.2s infinite;
        }
        @keyframes blink { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }
    </style>
</head>
<body>

    <div id="ui-container">
        <select id="songSelect">
            <option value="ode_to_joy">🇪🇺 Ode to Joy (Bēthovens — Pilna tēma)</option>
            <option value="star_wars">🚀 Star Wars Theme (Zvaigžņu kari)</option>
        </select>

        <div id="controls">
            <button class="toggle-btn active" id="btn0">🟢 Galvenā Melodija</button>
            <button class="toggle-btn active" id="btn1">🔵 Pavadošais Bass</button>
        </div>
    </div>

    <canvas id="gameCanvas" width="500" height="500"></canvas>
    <div id="info">KLIKŠĶINI UZ EKRĀNA, LAI IESLĒGTU SKAŅU</div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const songSelect = document.getElementById("songSelect");
        const infoElement = document.getElementById("info");

        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const outerRadius = 220; 

        let audioCtx = null;
        let flashOpacity = 0;

        const songs = {
            ode_to_joy: [
                { // 1. Bumba: Pilna, izstrādāta melodija (Taisna un skaidra)
                    type: "triangle", color: "#00ffcc", offsetX: -30,
                    notes: [
                        {f: 329.63, d: 0.4}, {f: 329.63, d: 0.4}, {f: 349.23, d: 0.4}, {f: 392.00, d: 0.4},
                        {f: 392.00, d: 0.4}, {f: 349.23, d: 0.4}, {f: 329.63, d: 0.4}, {f: 293.66, d: 0.4},
                        {f: 261.63, d: 0.4}, {f: 261.63, d: 0.4}, {f: 293.66, d: 0.4}, {f: 329.63, d: 0.4},
                        {f: 329.63, d: 0.6}, {f: 293.66, d: 0.2}, {f: 293.66, d: 0.8},
                        
                        {f: 329.63, d: 0.4}, {f: 329.63, d: 0.4}, {f: 349.23, d: 0.4}, {f: 392.00, d: 0.4},
                        {f: 392.00, d: 0.4}, {f: 349.23, d: 0.4}, {f: 329.63, d: 0.4}, {f: 293.66, d: 0.4},
                        {f: 261.63, d: 0.4}, {f: 261.63, d: 0.4}, {f: 293.66, d: 0.4}, {f: 329.63, d: 0.4},
                        {f: 293.66, d: 0.6}, {f: 261.63, d: 0.2}, {f: 261.63, d: 0.8}
                    ]
                },
                { // 2. Bumba: Atbilstošas basu harmonijas, kas mainās līdz ar akordiem
                    type: "sine", color: "#0077ff", offsetX: 30,
                    notes: [
                        {f: 130.81, d: 1.6}, {f: 146.83, d: 1.6}, {f: 130.81, d: 1.6}, {f: 196.00, d: 1.6},
                        {f: 130.81, d: 1.6}, {f: 146.83, d: 1.6}, {f: 130.81, d: 0.8}, {f: 196.00, d: 0.8}, {f: 130.81, d: 1.6}
                    ]
                }
            ],
            star_wars: [
                { // 1. Bumba: Galvenā tēma (Ar precīzām triolēm/pauzēm)
                    type: "sawtooth", color: "#ffcc00", offsetX: -30,
                    notes: [
                        {f: 146.83, d: 0.2}, {f: 146.83, d: 0.2}, {f: 146.83, d: 0.2},
                        {f: 196.00, d: 0.8}, {f: 293.66, d: 0.8},
                        {f: 261.63, d: 0.2}, {f: 246.94, d: 0.2}, {f: 220.00, d: 0.2}, {f: 392.00, d: 0.8}, {f: 293.66, d: 0.4},
                        {f: 261.63, d: 0.2}, {f: 246.94, d: 0.2}, {f: 220.00, d: 0.2}, {f: 392.00, d: 0.8}, {f: 293.66, d: 0.4},
                        {f: 261.63, d: 0.2}, {f: 246.94, d: 0.2}, {f: 261.63, d: 0.2}, {f: 220.00, d: 0.8}
                    ]
                },
                { // 2. Bumba: Ritma sekcija, kas uzsit spēcīgus akcentus uz katru takti
                    type: "sine", color: "#ff0055", offsetX: 30,
                    notes: [
                        {f: 98.00, d: 0.6}, {f: 0.00, d: 0.2}, 
                        {f: 98.00, d: 0.4}, {f: 146.83, d: 0.4},
                        {f: 130.81, d: 0.4}, {f: 123.47, d: 0.4}, {f: 110.00, d: 0.4}, {f: 98.00, d: 0.4},
                        {f: 146.83, d: 0.8}, {f: 98.00, d: 0.8}
                    ]
                }
            ]
        };

        class RhythmBall {
            constructor(config) {
                this.radius = 12;
                this.maxTravel = outerRadius - this.radius - 4;
                this.type = config.type;
                this.color = config.color;
                this.offsetX = config.offsetX;
                this.notes = config.notes;
                
                this.active = true; 
                this.noteIndex = 0;
                this.noteStartTime = 0;
                this.currentNoteDuration = 0.4;
                
                this.x = centerX + this.offsetX;
                this.y = centerY;
            }

            reset(currentTime) {
                this.noteIndex = 0;
                this.noteStartTime = currentTime;
                if(this.notes && this.notes.length > 0) {
                    this.currentNoteDuration = this.notes[0].d;
                }
            }

            update(currentTime) {
                if (!audioCtx || !this.notes || this.notes.length === 0) return;

                let timePassed = currentTime - this.noteStartTime;
                let progress = timePassed / this.currentNoteDuration;
                if (progress > 1) progress = 1;

                let positionFactor = (this.noteIndex % 2 === 0) ? Math.cos(progress * Math.PI) : -Math.cos(progress * Math.PI);

                this.x = centerX + this.offsetX;
                this.y = centerY + positionFactor * this.maxTravel;

                if (progress >= 1) {
                    this.playNote();
                }
            }

            playNote() {
                let note = this.notes[this.noteIndex % this.notes.length];

                if (this.active && note.f > 0 && audioCtx) {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);

                    osc.type = this.type;
                    osc.frequency.setValueAtTime(note.f, audioCtx.currentTime);

                    // Sabalansēts skaļums dažādiem sintezatoru veidiem
                    let vol = this.type === "sine" ? 0.4 : (this.type === "sawtooth" ? 0.12 : 0.16);
                    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + note.d);

                    osc.start();
                    osc.stop(audioCtx.currentTime + note.d);
                    
                    flashOpacity = 0.25;
                }

                this.noteIndex++;
                let nextNote = this.notes[this.noteIndex % this.notes.length];
                this.currentNoteDuration = nextNote.d;
                this.noteStartTime = audioCtx.currentTime;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                if (this.active) {
                    ctx.fillStyle = this.color;
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = this.color;
                    ctx.fill();
                } else {
                    ctx.strokeStyle = this.color;
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }
                ctx.closePath();
                ctx.shadowBlur = 0;
            }
        }

        let activeBalls = [];

        function loadSong() {
            activeBalls = [];
            const ballConfigs = songs[songSelect.value];
            
            ballConfigs.forEach((config, index) => {
                const newBall = new RhythmBall(config);
                if (audioCtx) newBall.reset(audioCtx.currentTime);
                activeBalls.push(newBall);
                
                const btn = document.getElementById(`btn${index}`);
                if (btn) {
                    btn.classList.add("active");
                }
            });
        }

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                activeBalls.forEach(ball => ball.reset(audioCtx.currentTime));
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
            infoElement.style.display = "none";
        }

        for (let i = 0; i < 2; i++) {
            const btn = document.getElementById(`btn${i}`);
            btn.addEventListener('click', (e) => {
                e.stopPropagation(); 
                if (activeBalls[i]) {
                    activeBalls[i].active = !activeBalls[i].active;
                    if (activeBalls[i].active) btn.classList.add("active");
                    else btn.classList.remove("active");
                }
            });
        }

        songSelect.addEventListener('change', loadSong);

        function drawOuterCircle() {
            ctx.beginPath();
            ctx.arc(centerX, centerY, outerRadius, 0, Math.PI * 2);
            ctx.lineWidth = 5;
            ctx.strokeStyle = `rgba(255, 255, 255, ${0.1 + flashOpacity})`;
            ctx.stroke();
            if (flashOpacity > 0) flashOpacity -= 0.01;
        }

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawOuterCircle();
            
            activeBalls.forEach(ball => {
                if (audioCtx) ball.update(audioCtx.currentTime);
                ball.draw();
            });

            requestAnimationFrame(gameLoop);
        }

        window.addEventListener('click', initAudio);
        window.addEventListener('touchstart', initAudio);

        loadSong();
        gameLoop();
    </script>
</body>
</html>
