<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfekta Ritma ASMR Spēle</title>
    <style>
        body {
            margin: 0;
            background-color: #05010d;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }
        #ui-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 20px;
        }
        #title {
            font-size: 20px;
            font-weight: bold;
            color: #00ffcc;
            letter-spacing: 3px;
        }
        canvas {
            border: 2px solid rgba(0, 255, 204, 0.1);
            border-radius: 50%;
            box-shadow: 0 0 40px rgba(0, 255, 204, 0.15);
            background-color: #020005;
        }
        #info {
            margin-top: 15px;
            font-size: 14px;
            color: #ff007f;
            font-weight: bold;
            animation: blink 1.2s infinite;
        }
        @keyframes blink {
            0% { opacity: 0.3; }
            50% { opacity: 1; }
            100% { opacity: 0.3; }
        }
    </style>
</head>
<body>

    <div id="ui-container">
        <div id="title">PERFECT RHYTHM SIMULATION</div>
    </div>

    <canvas id="gameCanvas" width="500" height="500"></canvas>
    <div id="info">🎧 UZKLIKŠĶINI, LAI IESLĒGTU RITMU</div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const infoElement = document.getElementById("info");

        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const outerRadius = 220; 
        
        let audioCtx = null;
        let startTime = 0;

        // Ritma uzstādījumi (BPM = Beats Per Minute)
        const bpm = 120; 
        const beatDuration = 60 / bpm; // Cik sekundes ilgst viens sitiens (0.5s pie 120 BPM)

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                startTime = audioCtx.currentTime;
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            infoElement.style.display = "none";
        }

        // Funkcija, kas rada spēcīgu bungu/bīta skaņu (Kick un Snare mikss)
        function playRhythmHit(isMainBeat) {
            if (!audioCtx) return;

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (isMainBeat) {
                // Zems bungu "KICK" sitiens uz katra galvenā takts viļņa
                osc.type = "triangle";
                osc.frequency.setValueAtTime(120, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.15);
                gain.gain.setValueAtTime(0.6, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.2);
            } else {
                // Augstāks "SNARE/HI-HAT" klikšķis starpā
                osc.type = "sine";
                osc.frequency.setValueAtTime(350, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.08);
            }
        }

        // Bumbiņas klase, kuras pozīcija ir atkarīga no LAIKA (ritma), nevis haotiskas fizikas
        class RhythmBall {
            constructor(phaseOffset, radius, color, isMain) {
                this.phaseOffset = phaseOffset; // Nobīde ritmā
                this.maxTravel = outerRadius - radius - 5; // Maksimālais attālums līdz malai
                this.radius = radius;
                this.color = color;
                this.isMain = isMain;
                this.lastHitSide = 0; // Lai fiksētu precīzu atsitiena brīdi vizuāli
            }

            update(elapsedTime) {
                // Izmantojam kosinusa funkciju, lai radītu nevainojamu svārsta/atsitiena kustību
                // sinhroni ar mūsu izvēlēto BPM ritmu
                let frequency = (Math.PI) / beatDuration; 
                let angle = frequency * elapsedTime + this.phaseOffset;
                
                // Normalizēta pozīcija starp -1 un 1
                let positionFactor = Math.cos(angle); 

                // Aprēķinām bumbiņas X un Y koordinātas (kustas pa diagonāli vai taisni)
                this.x = centerX + positionFactor * this.maxTravel * Math.cos(this.phaseOffset);
                this.y = centerY + positionFactor * this.maxTravel * Math.sin(this.phaseOffset);

                // Fiksējam brīdi, kad positionFactor sasniedz galējos punktus (1 vai -1), kas ir atsitiens
                let currentSide = Math.sign(Math.round(positionFactor * 100));
                if (currentSide !== this.lastHitSide && Math.abs(positionFactor) > 0.98) {
                    playRhythmHit(this.isMain);
                    this.lastHitSide = currentSide;
                    triggerFlash();
                }
                if (Math.abs(positionFactor) < 0.5) {
                    this.lastHitSide = 0; // Atjaunojam stāvokli vidū
                }
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color;
                ctx.fill();
                ctx.closePath();
                ctx.shadowBlur = 0;
            }
        }

        // Izveidojam divas bumbiņas, kas kustas pretējos ritmos un virzienos, lai izveidotu pilnvērtīgu bītu
        const balls = [
            new RhythmBall(0, 14, "#00ffcc", true),          // Galvenais bīts (uz leju/augšu)
            new RhythmBall(Math.PI / 2, 11, "#ff007f", false) // Papildritms (pa labi/kreisi)
        ];

        let flashOpacity = 0;
        function triggerFlash() {
            flashOpacity = 0.15; // Aplis nedaudz uzplaiksnī ritmā
        }

        function drawOuterCircle() {
            ctx.beginPath();
            ctx.arc(centerX, centerY, outerRadius, 0, Math.PI * 2);
            ctx.lineWidth = 6;
            ctx.strokeStyle = `rgba(0, 255, 204, ${0.2 + flashOpacity})`;
            ctx.stroke();

            if (flashOpacity > 0) flashOpacity -= 0.01;

            // Vizuālas līnijas ritma asij
            ctx.beginPath();
            ctx.arc(centerX, centerY, 5, 0, Math.PI * 2);
            ctx.fillStyle = "rgba(255, 255, 255, 0.1)";
            ctx.fill();
        }

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            let elapsedTime = audioCtx ? audioCtx.currentTime - startTime : 0;

            drawOuterCircle();

            balls.forEach(ball => {
                ball.update(elapsedTime);
                ball.draw();
            });

            requestAnimationFrame(gameLoop);
        }

        window.addEventListener('click', initAudio);
        window.addEventListener('touchstart', initAudio);

        gameLoop();
    </script>
</body>
</html>
