<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Bumbiņu Ritma Fizika</title>
    <style>
        body {
            margin: 0;
            background-color: #04010a;
            color: white;
            font-family: monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }
        #ui-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        select {
            padding: 10px 16px;
            font-size: 16px;
            font-weight: bold;
            background-color: #120526;
            color: #00ffcc;
            border: 2px solid #ff007f;
            border-radius: 6px;
            cursor: pointer;
            outline: none;
        }
        canvas {
            border: 2px solid rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            box-shadow: 0 0 40px rgba(0, 255, 204, 0.25);
            background-color: #010003;
        }
        #info {
            margin-top: 15px;
            font-size: 14px;
            color: #ff007f;
            font-weight: bold;
            animation: blink 1.2s infinite;
        }
        @keyframes blink { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }
    </style>
</head>
<body>

    <div id="ui-container">
        <select id="songSelect">
            <option value="axelf">🎵 Crazy Frog (Zaļā: Sintezators | Rozā: Basi)</option>
            <option value="wewillrockyou">🎸 Queen - We Will Rock You (Zaļā: Solo | Rozā: Bungas)</option>
            <option value="megalovania">💀 Megalovania (Zaļā: Melodija | Rozā: Ātrais bīts)</option>
        </select>
    </div>

    <canvas id="gameCanvas" width="500" height="500"></canvas>
    <div id="info">KLIKŠĶINI UZ EKRĀNA, LAI IESLĒGTU</div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const songSelect = document.getElementById("songSelect");
        const infoElement = document.getElementById("info");

        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const outerRadius = 220; 

        let audioCtx = null;
        let flashOpacity = 0;

        // Katrai dziesmai ir divi neatkarīgi masīvi: track1 un track2
        const songs = {
            axelf: {
                track1: [ // Sintezatora melodija
                    { f: 293.66, d: 0.4 }, { f: 349.23, d: 0.4 }, { f: 293.66, d: 0.2 }, { f: 293.66, d: 0.2 },
                    { f: 392.00, d: 0.4 }, { f: 293.66, d: 0.4 }, { f: 261.63, d: 0.4 },
                    { f: 293.66, d: 0.4 }, { f: 440.00, d: 0.4 }, { f: 293.66, d: 0.2 }, { f: 293.66, d: 0.2 },
                    { f: 466.16, d: 0.4 }, { f: 440.00, d: 0.4 }, { f: 349.23, d: 0.4 }
                ],
                track2: [ // Pavadošais basu ritms
                    { f: 110.00, d: 0.8 }, { f: 110.00, d: 0.8 }, { f: 146.83, d: 0.8 }, { f: 146.83, d: 0.8 },
                    { f: 130.81, d: 0.8 }, { f: 164.81, d: 0.8 }
                ]
            },
            wewillrockyou: {
                track1: [ // Ģitāras / Vokāla daļa
                    { f: 0.00,   d: 1.4 }, { f: 293.00, d: 0.35 }, { f: 261.00, d: 0.35 }, 
                    { f: 196.00, d: 0.7 }, { f: 220.00, d: 0.7 }
                ],
                track2: [ // Slavenais bungu ritms (Bums-Bums-Čiks)
                    { f: 80.00, d: 0.35 }, { f: 80.00, d: 0.35 }, { f: 150.00, d: 0.7 },
                    { f: 80.00, d: 0.35 }, { f: 80.00, d: 0.35 }, { f: 150.00, d: 0.7 }
                ]
            },
            megalovania: {
                track1: [ // Pamata tēma
                    { f: 293.66, d: 0.3 }, { f: 293.66, d: 0.3 }, { f: 587.33, d: 0.6 }, { f: 440.00, d: 0.9 },
                    { f: 415.30, d: 0.6 }, { f: 392.00, d: 0.6 }, { f: 349.23, d: 0.6 }
                ],
                track2: [ // Ātrais fona temps
                    { f: 100.00, d: 0.15 }, { f: 100.00, d: 0.15 }, { f: 100.00, d: 0.15 }, { f: 100.00, d: 0.15 },
                    { f: 120.00, d: 0.15 }, { f: 120.00, d: 0.15 }, { f: 120.00, d: 0.15 }, { f: 120.00, d: 0.15 }
                ]
            }
        };

        class RhythmBall {
            constructor(offsetX, color, type) {
                this.radius = 12;
                this.maxTravel = outerRadius - this.radius - 4;
                this.color = color;
                this.offsetX = offsetX; // Nobīde no centra, lai bumbiņas nesaliptu
                this.type = type; // "sine" vai "triangle" sintezatoram
                
                this.noteIndex = 0;
                this.noteStartTime = 0;
                this.currentNoteDuration = 0.5;
            }

            reset(currentTime, duration) {
                this.noteIndex = 0;
                this.noteStartTime = currentTime;
                this.currentNoteDuration = duration;
            }

            update(currentTime, trackData) {
                if (!audioCtx) return;

                let timePassed = currentTime - this.noteStartTime;
                let progress = timePassed / this.currentNoteDuration;
                if (progress > 1) progress = 1;

                // Aprēķina kustību augšup/lejup
                let positionFactor;
                if (this.noteIndex % 2 === 0) {
                    positionFactor = Math.cos(progress * Math.PI);
                } else {
                    positionFactor = -Math.cos(progress * Math.PI);
                }

                this.x = centerX + this.offsetX;
                this.y = centerY + positionFactor * this.maxTravel;

                // Kad sasniegts malas punkts, atskaņo noti un pārslēdzas uz nākamo
                if (progress >= 1) {
                    this.playNote(trackData);
                }
            }

            playNote(trackData) {
                let note = trackData[this.noteIndex % trackData.length];

                if (note.f > 0) {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);

                    osc.type = this.type;
                    osc.frequency.setValueAtTime(note.f, audioCtx.currentTime);

                    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + note.d);

                    osc.start();
                    osc.stop(audioCtx.currentTime + note.d);
                    
                    flashOpacity = 0.35;
                }

                this.noteIndex++;
                let nextNote = trackData[this.noteIndex % trackData.length];
                this.currentNoteDuration = nextNote.d;
                this.noteStartTime = audioCtx.currentTime;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color;
                ctx.fill();
                ctx.closePath();
                ctx.shadowBlur = 0;
            }
        }

        // Izveidojam divas bumbiņas ar nobīdi pa kreisi (-40px) un pa labi (+40px)
        const ball1 = new RhythmBall(-40, "#00ffcc", "triangle"); // Melodija
        const ball2 = new RhythmBall(40, "#ff007f", "sine");     // Bungi / Basi

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const currentSong = songs[songSelect.value];
                ball1.reset(audioCtx.currentTime, currentSong.track1[0].d);
                ball2.reset(audioCtx.currentTime, currentSong.track2[0].d);
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            infoElement.style.display = "none";
        }

        songSelect.addEventListener('change', () => {
            if (audioCtx) {
                const currentSong = songs[songSelect.value];
                ball1.reset(audioCtx.currentTime, currentSong.track1[0].d);
                ball2.reset(audioCtx.currentTime, currentSong.track2[0].d);
            }
        });

        function drawOuterCircle() {
            ctx.beginPath();
            ctx.arc(centerX, centerY, outerRadius, 0, Math.PI * 2);
            ctx.lineWidth = 6;
            ctx.strokeStyle = `rgba(255, 255, 255, ${0.15 + flashOpacity})`;
            ctx.stroke();

            if (flashOpacity > 0) flashOpacity -= 0.02;
        }

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawOuterCircle();
            
            if (audioCtx) {
                const currentSong = songs[songSelect.value];
                ball1.update(audioCtx.currentTime, currentSong.track1);
                ball2.update(audioCtx.currentTime, currentSong.track2);
            }
            
            ball1.draw();
            ball2.draw();

            requestAnimationFrame(gameLoop);
        }

        window.addEventListener('click', initAudio);
        window.addEventListener('touchstart', initAudio);

        gameLoop();
    </script>
</body>
</html>
